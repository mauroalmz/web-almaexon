<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almaexon | En Mantenimiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0C1829; 
            color: #FFFFFF; 
            font-family: 'Roboto', sans-serif; 
        }
        
        /* Respiración con mayor escala y opacidad para que se note en móviles y PC */
        @keyframes breath-bg {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.7; }
        }

        .animate-breath-bg {
            animation: breath-bg 8s ease-in-out infinite; /* Ciclo ajustado a 8s para ser más perceptible */
            position: absolute;
            top: 50%;
            left: 50%;
            /* Gradiente con mayor presencia (0.2 de opacidad base) */
            background: radial-gradient(circle, rgba(37,150,190,0.2) 0%, rgba(12,24,41,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Clase para la transición suave del texto */
        .text-transition {
            transition: opacity 0.8s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-center px-6 md:px-12 relative overflow-hidden">

    <div class="animate-breath-bg w-[150vw] h-[150vw] md:w-[80vw] md:h-[80vw]"></div>

    <div class="max-w-lg z-10 w-full">
        
        <div class="flex justify-center mb-8">
            <img src="/Almaexon.png" alt="Almaexon" class="h-24 md:h-28 w-auto animate-pulse">
        </div>
        
        <h1 class="text-2xl md:text-3xl font-bold font-montserrat mb-4 tracking-widest text-white uppercase leading-snug">
            Infraestructura en Optimización
        </h1>
        
        <div class="h-1 w-20 bg-[#2596BE] mx-auto mb-8 rounded-full"></div>
        
        <div class="h-28 md:h-24 flex items-center justify-center mb-6 px-2">
            <p id="dynamic-text" class="text-slate-300 text-sm md:text-base leading-relaxed font-light tracking-wide text-transition opacity-100">
                </p>
        </div>
        
        <p class="text-xs font-mono text-[#2596BE]/60 tracking-widest uppercase mt-4">
            Soporte Activo · Almaexon 2026
        </p>
    </div>

    <script>
        const phrases = [
            "Redefiniendo el estándar del soporte técnico. Más rápido, más preciso, más inteligente.",
            "Integrando el potencial técnico con el factor humano. Una infraestructura diseñada donde vos sos la pieza central.",
            "Vos y tu tecnología trabajando en equipo para multiplicar tus resultados. Falta muy poco.",
            "Optimizando todo detrás del telón para que ni vos ni tu empresa tengan que detenerse. En breve.",
            "Construyendo el ecosistema tecnológico definitivo para el cuidado de tus equipos, de vos y de los tuyos."
        ];

        const textElement = document.getElementById('dynamic-text');
        
        // Elegir una frase aleatoria inicial
        let currentIndex = Math.floor(Math.random() * phrases.length);
        
        // Mostrar la frase elegida inmediatamente al cargar la página
        textElement.textContent = phrases[currentIndex];

        // Función que rota el texto cada 23 segundos
        setInterval(() => {
            textElement.classList.replace('opacity-100', 'opacity-0');
            
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % phrases.length;
                textElement.textContent = phrases[currentIndex];
                
                textElement.classList.replace('opacity-0', 'opacity-100');
            }, 800); 

        }, 23000); 
    </script>
</body>
</html>
